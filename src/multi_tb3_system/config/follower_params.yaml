# follower_node.py parameters — distances in m, velocities in m/s, angles in deg
#
# leader_ns and odom_lidar_divergence_m are set at launch time by
# followers.launch.py. Defaults here are fallback-only.

follower_node:
  ros__parameters:

    target_distance:      1.0    # maintain this gap from robot ahead
    safe_distance:        0.4    # hard-stop if anything closer than this

    kp_linear:            0.8    # linear_vel  = kp_linear  * (dist - target_distance)
    kp_angular:           2.0    # angular_vel = kp_angular * angle_to_target

    max_linear_velocity:  0.22   # TB3 Burger hardware limit
    max_angular_velocity: 1.0

    # leader_ns: namespace of the convoy orchestrator (always tb1).
    # Overridden at launch time by followers.launch.py.
    leader_ns: 'tb1'
