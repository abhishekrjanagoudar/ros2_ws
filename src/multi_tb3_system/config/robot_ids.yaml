# robot_ids.yaml — convoy formation reference (NOT loaded at runtime).
# Actual formation is defined in spawn_robots.launch.py / multi_robot.launch.py.

convoy:
  robots:
    - namespace: "tb1"
      role: "leader"
      initial_pose: {x: 0.0, y: 0.0, yaw: 0.0}

    - namespace: "tb2"
      role: "follower"
      follows: "tb1"
      initial_pose: {x: -1.0, y: 0.0, yaw: 0.0}

    - namespace: "tb3"
      role: "follower"
      follows: "tb2"
      initial_pose: {x: -2.0, y: 0.0, yaw: 0.0}
